<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Sin conexión — Hacé Cuentas</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #ffffff;
        --bg-soft: #f8fafc;
        --text: #0f172a;
        --text-muted: #475569;
        --text-subtle: #64748b;
        --accent: #2563eb;
        --accent-strong: #1e40af;
        --border: #e2e8f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --bg-soft: #1e293b;
          --text: #f1f5f9;
          --text-muted: #cbd5e1;
          --text-subtle: #94a3b8;
          --accent: #60a5fa;
          --accent-strong: #93c5fd;
          --border: #334155;
        }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 480px;
        width: 100%;
        text-align: center;
        background: var(--bg-soft);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem 2rem;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.25rem;
        background: var(--bg);
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 1.75rem;
        border: 1px solid var(--border);
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        color: var(--text-muted);
        margin-bottom: 0.875rem;
        font-size: 0.9375rem;
      }
      .hint {
        font-size: 0.8125rem;
        color: var(--text-subtle);
        margin-top: 1.5rem;
      }
      .actions {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 1.5rem;
        flex-wrap: wrap;
      }
      button, a {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.625rem 1.125rem;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        border: 1px solid transparent;
        transition: all 0.15s;
      }
      .btn-primary {
        background: var(--accent);
        color: #ffffff;
      }
      .btn-primary:hover { background: var(--accent-strong); }
      .btn-ghost {
        background: var(--bg);
        color: var(--text);
        border-color: var(--border);
      }
      .btn-ghost:hover { background: var(--bg-soft); }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon" aria-hidden="true">📡</div>
      <h1>Sin conexión</h1>
      <p>
        Parece que te quedaste sin internet. Las calculadoras que ya
        visitaste pueden funcionar igual desde tu navegador.
      </p>
      <div class="actions">
        <button type="button" class="btn-primary" onclick="location.reload()">Reintentar</button>
        <a href="/" class="btn-ghost">Volver al inicio</a>
      </div>
      <p class="hint">
        Hacé Cuentas funciona casi todo offline una vez que cargaste una página.
      </p>
    </main>
    <script>
      // Auto-reintentar cuando vuelve la conexión
      window.addEventListener('online', function () {
        location.reload();
      });
    </script>
  </body>
</html>
