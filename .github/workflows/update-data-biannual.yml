name: Update data (biannual / yearly — issue tracker)

# Los calcs con frequency biannual/yearly requieren un updater auto-llm
# (leer normativa desde páginas oficiales, a veces PDFs). Ese fetcher todavía
# no está implementado.
#
# Hasta que esté, este workflow crea un issue cada 6 meses (15 enero y 15
# julio) con la lista de calcs que probablemente necesiten revisión manual.
# Así Martin no se olvida y podemos trackear el backlog.
#
# Cuando implementemos el auto-llm fetcher, este workflow va a correrlo
# en vez de abrir issue.

on:
  schedule:
    # 15 de enero y 15 de julio, 10:00 UTC
    - cron: '0 10 15 1,7 *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  remind:
    name: Crear issue de revisión
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate pending list
        id: pending
        run: |
          node --experimental-strip-types scripts/update-data/index.ts --report > /tmp/report.txt 2>&1 || true
          {
            echo 'body<<EOF'
            echo "## 📋 Revisión semestral de calcs biannual / yearly"
            echo ""
            echo "Estos calcs tienen frecuencia de actualización biannual o yearly y"
            echo "requieren revisión manual (todavía no hay fetcher auto-llm)."
            echo ""
            echo "### Checklist"
            echo ""
            echo "- [ ] Revisar cada fuente oficial (AFIP/ARCA, ANSES, Ministerio de Trabajo, etc.)"
            echo "- [ ] Actualizar valores hardcodeados en formulas \`.ts\` y presets JSON"
            echo "- [ ] Correr \`npm run new-calc\` si hay calcs nuevas (no olvidar \`dataUpdate\`)"
            echo "- [ ] Verificar que \`lastUpdated\` quedó con fecha correcta"
            echo "- [ ] Correr \`npm run build\` y revisar que no falle validación"
            echo ""
            echo "### Coverage report"
            echo ""
            echo '```'
            cat /tmp/report.txt
            echo '```'
            echo ""
            echo "Auto-generado por \`.github/workflows/update-data-biannual.yml\`."
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.pending.outputs.body }}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 Revisión semestral de datos — ${today}`,
              body,
              labels: ['data-update', 'manual-review']
            });
