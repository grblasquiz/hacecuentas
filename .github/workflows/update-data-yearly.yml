name: Update data (yearly auto-llm)

# Calcs con frequency=yearly: Bienes Personales (ARCA), costo laboral patronal
# (ARCA+SRT), Ingresos Brutos provinciales, etc. Normativas que cambian una
# vez por año fiscal (ley de presupuesto, DNU, resoluciones de ARCA).
#
# Cron: 1 de febrero a las 10:00 UTC. A esa altura ARCA ya publicó los
# valores del año fiscal nuevo (declaración marzo-abril).
#
# Si ANTHROPIC_API_KEY está configurada, corre los fetchers auto-llm y abre
# PR. Si no, abre issue con checklist manual (modo fallback).

on:
  schedule:
    - cron: '0 10 1 2 *'
  workflow_dispatch:
    inputs:
      dry:
        description: 'Dry run (no escribe archivos, no abre PR)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    name: Auto-LLM fetchers (yearly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Detect API key
        id: config
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "mode=auto" >> $GITHUB_OUTPUT
            echo "✓ ANTHROPIC_API_KEY configurada — corriendo auto-llm"
          else
            echo "mode=manual" >> $GITHUB_OUTPUT
            echo "✗ ANTHROPIC_API_KEY no configurada — abrirá issue de revisión manual"
          fi

      - name: Run yearly fetchers
        if: steps.config.outputs.mode == 'auto'
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS="--frequency=yearly"
          if [ "${{ inputs.dry }}" = "true" ]; then FLAGS="$FLAGS --dry"; fi
          node --experimental-strip-types scripts/update-data/index.ts $FLAGS | tee /tmp/update.log
          SUMMARY=$(grep '^SUMMARY::' /tmp/update.log | tail -1 | sed 's/^SUMMARY:://')
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          CHANGED=$(echo "$SUMMARY" | node -e "const s=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log(s.changed||0)")
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Create pull request
        if: steps.config.outputs.mode == 'auto' && steps.run.outputs.changed != '0' && inputs.dry != true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-yearly
          delete-branch: true
          commit-message: |
            chore(data): actualización anual auto-llm

            ${{ steps.run.outputs.summary }}
          title: '🔄 Update data (yearly auto-llm) — ${{ github.run_number }}'
          body: |
            Pipeline automático de actualización anual usando Claude + WebSearch.

            **Summary:**
            ```json
            ${{ steps.run.outputs.summary }}
            ```

            ⚠️ **REVISAR CUIDADOSAMENTE** — estos valores vienen de Claude investigando
            fuentes oficiales (ARCA, SRT, infoleg, códigos fiscales provinciales).
            Verificar contra la normativa publicada antes de mergear:

            - Chequear MNI + escalas de Bienes Personales contra la RG ARCA.
            - Confirmar alícuotas patronales contra Dec. 814/2001 y DNU vigentes.
            - Revisar que no haya cambios estructurales (categorías nuevas/removidas).

            Si algo está mal, cerrar el PR y corregir el prompt del fetcher antes del próximo cron.
          labels: |
            data-update
            automated
            auto-llm
            needs-review

      - name: Generate pending list (fallback)
        if: steps.config.outputs.mode == 'manual'
        id: pending
        run: |
          node --experimental-strip-types scripts/update-data/index.ts --report > /tmp/report.txt 2>&1 || true
          {
            echo 'body<<EOF'
            echo "## 📋 Revisión anual manual"
            echo ""
            echo "**Config pendiente:** falta \`ANTHROPIC_API_KEY\` en los secrets del repo."
            echo ""
            echo "### Checklist manual"
            echo ""
            echo "- [ ] Bienes Personales: MNI + escala + deducción casa-habitación (ARCA)"
            echo "- [ ] Costo laboral: cargas patronales grande/pyme + ART (ARCA/SRT)"
            echo "- [ ] Ingresos Brutos: alícuotas provinciales (AGIP/ARBA/DGR)"
            echo "- [ ] Actualizar \`lastUpdated\` en cada JSON"
            echo "- [ ] Correr \`npm run build\` para verificar validación"
            echo ""
            echo "### Coverage report"
            echo ""
            echo '```'
            cat /tmp/report.txt
            echo '```'
            echo ""
            echo "Auto-generado por \`.github/workflows/update-data-yearly.yml\`."
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create fallback issue
        if: steps.config.outputs.mode == 'manual'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.pending.outputs.body }}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 Revisión anual de datos — ${today}`,
              body,
              labels: ['data-update', 'manual-review', 'config-needed']
            });
