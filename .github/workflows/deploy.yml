name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite correr manual desde Github UI

concurrency:
  # Cancela deploys anteriores si llega uno nuevo antes de que termine.
  # Así ahorra builds y siempre deploya el último commit.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # si algo se cuelga, corta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Purge Cloudflare cache
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -q '"success":true' && echo "✅ Cache purgado"
