name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite correr manual desde Github UI

concurrency:
  # Encola deploys (no cancela el en curso). Si cancelamos cuando llega un
  # nuevo push, los crons (data-update-daily, refresh-freshness, indexnow-*)
  # que pushean dentro de la ventana de build pisan al deploy original y
  # nada llega a prod. Era exactamente lo que pasaba 2026-04-26/27: 4 deploys
  # seguidos quedaron `cancelled` y wrangler tuvo que ir a mano.
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Build local: ~90s. CI con npm ci + 2700+ páginas: ~6-10 min observado.
    # Antes era 15 → cortaba. Subimos a 30 con margen.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 trae toda la historia del repo. La necesita
          # scripts/generate-sitemap.ts para usar `git log` como fuente
          # de `lastmod` por archivo — sino el mtime del checkout es
          # uniforme y el sitemap reporta "todo cambió hoy" (mala señal
          # para Google crawl budget).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Verbose timing: imprime tiempo de cada sub-step de prebuild + astro build.
        # Si futuro deploy vuelve a colgar, queda registro de qué etapa fue.
        run: |
          set -e
          echo "::group::env info"
          node --version
          npm --version
          free -h || true
          df -h .
          echo "::endgroup::"
          echo "::group::npm run build (with /usr/bin/time)"
          /usr/bin/time -v npm run build 2>&1 || EXIT=$?
          echo "::endgroup::"
          exit ${EXIT:-0}

      # El adapter @astrojs/cloudflare genera DOS configs en el build:
      #   1. dist/server/wrangler.json  ← la que queremos usar (workingDirectory)
      #   2. .wrangler/deploy/config.json  ← "deploy config" apuntando a 1
      # Wrangler ve las dos con base paths distintos y aborta con:
      #   "Found both a user configuration file at \"wrangler.json\"
      #    and a deploy configuration file at \"../../.wrangler/deploy/config.json\".
      #    But these do not share the same base path..."
      # Eliminamos el deploy config para que wrangler use solo el wrangler.json
      # de dist/server/.
      - name: Remove stale .wrangler/deploy/config.json
        run: rm -rf .wrangler/deploy

      # Diagnóstico pre-deploy: verifica que el token CF es válido y lista
      # los scopes/permission groups. Si la próxima step falla por 10000
      # (auth) esto deja un rastro claro en el log sin exponer el secret.
      # Imprimimos solo metadatos (id, status, scopes) — nunca el token.
      - name: Verify Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          if [ -z "$CF_TOKEN" ]; then echo "ERROR: CLOUDFLARE_API_TOKEN vacío en GH Secrets"; exit 1; fi
          if [ -z "$CF_ACCT" ]; then echo "ERROR: CLOUDFLARE_ACCOUNT_ID vacío en GH Secrets"; exit 1; fi

          # Whitespace/newline check — copy-paste al GH Secret UI suele dejar \n al final.
          CLEAN_TOKEN=$(printf '%s' "$CF_TOKEN" | tr -d '[:space:]')
          if [ "${#CLEAN_TOKEN}" != "${#CF_TOKEN}" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN contiene whitespace/newlines (${#CF_TOKEN} → ${#CLEAN_TOKEN})"
            echo "Re-pegar el token en GH → Settings → Secrets sin saltos de línea."
            exit 1
          fi
          echo "OK token len: ${#CF_TOKEN} | account id len: ${#CF_ACCT}"

          echo "--- /user/tokens/verify ---"
          VERIFY=$(curl -sS "https://api.cloudflare.com/client/v4/user/tokens/verify" -H "Authorization: Bearer $CF_TOKEN")
          echo "$VERIFY" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',{}); ok=d.get('success'); print('token id:',r.get('id','?'),'status:',r.get('status','?'),'ok:',ok); sys.exit(0 if ok else 1)"

          echo "--- probe Workers Scripts: GET /accounts/\$CF_ACCT/workers/scripts ---"
          PROBE_HTTP=$(curl -sS -o /tmp/cf-probe.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCT/workers/scripts" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "HTTP $PROBE_HTTP"
          python3 -c "import json,sys; d=json.load(open('/tmp/cf-probe.json')); print('success:',d.get('success'),'errors:',d.get('errors')); sys.exit(0 if d.get('success') else 1)"

          echo "--- probe KV: GET /accounts/\$CF_ACCT/storage/kv/namespaces ---"
          curl -sS -o /tmp/kv-probe.json -w "HTTP %{http_code}\n" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCT/storage/kv/namespaces" \
            -H "Authorization: Bearer $CF_TOKEN"
          python3 -c "import json; d=json.load(open('/tmp/kv-probe.json')); print('success:',d.get('success'),'errors:',d.get('errors'))" || true

      # Reemplazamos wrangler-action@v3 por npx directo para poder ver el
       # stderr completo en el log (la action envuelve la salida y con
      # runs anónimos no podemos leer los logs detallados del job).
      - name: Deploy to Cloudflare Workers
        working-directory: dist/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Con output:'server' el adapter @astrojs/cloudflare genera un
        # wrangler.json en dist/server/ con paths relativos a ese dir
        # (main: entry.mjs, assets: ../client). Por eso corremos wrangler
        # DESDE dist/server/ — sino los paths no resuelven.
        run: |
          echo "--- wrangler version ---"
          npx wrangler@latest --version
          echo "--- dist/server contents ---"
          ls -la
          echo "--- wrangler.json ---"
          cat wrangler.json | python3 -m json.tool | head -40
          echo "--- deploy ---"
          npx wrangler@latest deploy 2>&1

      - name: Purge Cloudflare cache
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -q '"success":true' && echo "✅ Cache purgado"
