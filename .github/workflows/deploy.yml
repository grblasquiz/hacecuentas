name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite correr manual desde Github UI

concurrency:
  # Cancela deploys anteriores si llega uno nuevo antes de que termine.
  # Así ahorra builds y siempre deploya el último commit.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # si algo se cuelga, corta
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 trae toda la historia del repo. La necesita
          # scripts/generate-sitemap.ts para usar `git log` como fuente
          # de `lastmod` por archivo — sino el mtime del checkout es
          # uniforme y el sitemap reporta "todo cambió hoy" (mala señal
          # para Google crawl budget).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Diagnóstico pre-deploy: verifica que el token CF es válido y lista
      # los scopes/permission groups. Si la próxima step falla por 10000
      # (auth) esto deja un rastro claro en el log sin exponer el secret.
      # Imprimimos solo metadatos (id, status, scopes) — nunca el token.
      - name: Verify Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          if [ -z "$CF_TOKEN" ]; then echo "ERROR: CLOUDFLARE_API_TOKEN vacío"; exit 1; fi
          if [ -z "$CF_ACCT" ]; then echo "ERROR: CLOUDFLARE_ACCOUNT_ID vacío"; exit 1; fi
          echo "token len: ${#CF_TOKEN} | account id len: ${#CF_ACCT}"
          echo "--- /user/tokens/verify ---"
          curl -sS "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',{}); print('token id:',r.get('id','?'),'status:',r.get('status','?'),'ok:',d.get('success'))" || true
          echo "--- probe: GET /accounts/\$CF_ACCT/workers/scripts ---"
          curl -sS -o /tmp/cf-probe.json -w "HTTP %{http_code}\n" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCT/workers/scripts" \
            -H "Authorization: Bearer $CF_TOKEN" || true
          python3 -c "import json; d=json.load(open('/tmp/cf-probe.json')); print('success:',d.get('success'),'errors:',d.get('errors'))" || cat /tmp/cf-probe.json

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Con output:'server' el adapter @astrojs/cloudflare genera un
          # wrangler.json en dist/server/ con paths relativos a ese dir
          # (main: entry.mjs, assets: ../client). Por eso corremos wrangler
          # DESDE dist/server/ — sino los paths no resuelven.
          workingDirectory: dist/server
          command: deploy

      - name: Purge Cloudflare cache
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -q '"success":true' && echo "✅ Cache purgado"
