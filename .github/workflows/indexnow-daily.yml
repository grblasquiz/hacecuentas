name: IndexNow daily push (Bing + Yandex)

# Cron diario que pushea TODAS las URLs del sitemap al IndexNow API
# (Bing, Yandex, Seznam, Naver). Complementa indexnow-push.yml — ese corre
# post-deploy en main; este corre todos los días aunque no haya deploys, para
# que Bing/Yandex queden alineados con el push diario que Google ya recibe vía
# google-indexing-daily.yml.
#
# IndexNow no requiere credenciales (sólo la key file servida por CF Pages en
# /00e48c587b06495db41032c4797d9d39.txt) — no hay secrets que configurar.
# El script ya batchea de a 10.000 URLs (límite de IndexNow).

on:
  schedule:
    # 09:30 UTC (06:30 AR) — 30 min después de google-indexing-daily.yml
    # para evitar overlap en el runner queue.
    - cron: '30 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: false
        default: 'all'
        type: choice
        options:
          - all       # todas las URLs del sitemap (default)
          - priority  # solo sitemap-priority.xml

jobs:
  indexnow-daily:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Push URLs to IndexNow (Bing + Yandex + Seznam + Naver)
        id: push
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          set -o pipefail
          if [ "$MODE" = "priority" ]; then
            python3 scripts/indexnow-push.py 2>&1 | tee /tmp/indexnow.log
          else
            python3 scripts/indexnow-push.py --all 2>&1 | tee /tmp/indexnow.log
          fi
          # Validar que cada submission devolvió status 200 o 202
          if grep -qE '⚠️|❌|status=4[0-9]{2}|status=5[0-9]{2}' /tmp/indexnow.log; then
            echo "::error::IndexNow push tuvo errores"
            exit 1
          fi

      - name: Open GitHub issue if push failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🚨 IndexNow daily push falló ($(date -u +'%Y-%m-%d'))"
          BODY=$(cat <<EOF
          El cron diario de IndexNow falló.

          **Workflow:** [\`${{ github.workflow }}\` run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Trigger:** ${{ github.event_name }}
          **Fecha:** $(date -u +'%Y-%m-%d %H:%M UTC')

          ## Log
          \`\`\`
          $(cat /tmp/indexnow.log 2>/dev/null | tail -30 || echo 'sin log')
          \`\`\`

          ## Próximos pasos
          1. Revisar el log completo en el run linkeado arriba
          2. Si es 403 → verificar que la key IndexNow ($KEY_LOCATION) sigue siendo válida y servida correctamente desde CF Pages
          3. Si es 422 → URLs malformadas en el sitemap
          4. Si es 429 → rate limit, reducir la frecuencia
          5. Si es 5xx → error transitorio del proveedor, esperar y re-correr manualmente con \`workflow_dispatch\`
          EOF
          )
          # Buscar issue abierto del mismo workflow para no duplicar
          EXISTING=$(gh issue list --label indexnow-failure --state open --json number --jq '.[0].number' || echo '')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label indexnow-failure || \
              gh issue create --title "$TITLE" --body "$BODY"
          fi
