name: IndexNow push (post-deploy)

# Pushea URLs al IndexNow API (Bing + Yandex) después de cada push a main.
# Bing crawlea más rápido que Google y sus señales a veces disparan crawls de Google.
# También genera tráfico directo desde Bing.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
  workflow_dispatch:

jobs:
  push-to-indexnow:
    runs-on: ubuntu-latest
    # Espera 3 min para que Cloudflare termine el deploy antes de notificar a Bing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for CF Pages deploy
        run: sleep 180

      - name: Push priority URLs to IndexNow
        run: |
          set -o pipefail
          python3 scripts/indexnow-push.py 2>&1 | tee -a /tmp/indexnow.log
          if grep -qE '⚠️|❌|status=4[0-9]{2}|status=5[0-9]{2}' /tmp/indexnow.log; then
            echo "::error::IndexNow priority push falló"; exit 1
          fi

      - name: Push all URLs (every push)
        run: |
          set -o pipefail
          python3 scripts/indexnow-push.py --all 2>&1 | tee -a /tmp/indexnow.log
          if tail -20 /tmp/indexnow.log | grep -qE '⚠️|❌|status=4[0-9]{2}|status=5[0-9]{2}'; then
            echo "::error::IndexNow --all push falló"; exit 1
          fi

      - name: Open GitHub issue if push failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🚨 IndexNow post-deploy push falló"
          BODY=$(cat <<EOF
          El push IndexNow tras el deploy ($GITHUB_SHA) falló.

          **Workflow:** [\`${{ github.workflow }}\` run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit:** \`${{ github.sha }}\`
          **Fecha:** $(date -u +'%Y-%m-%d %H:%M UTC')

          ## Log
          \`\`\`
          $(tail -30 /tmp/indexnow.log 2>/dev/null || echo 'sin log')
          \`\`\`
          EOF
          )
          EXISTING=$(gh issue list --label indexnow-failure --state open --json number --jq '.[0].number' || echo '')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label indexnow-failure 2>/dev/null || \
              gh issue create --title "$TITLE" --body "$BODY"
          fi
