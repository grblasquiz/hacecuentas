name: Google Indexing API (daily push)

# Pushea 200 URLs/día al Google Indexing API (quota diaria del proyecto GCP).
# El script tiene dedupe de 7 días, así que no repite URLs recién enviadas —
# toma las 200 URLs del sitemap que hace más tiempo no se pushean (cola FIFO
# implícita por el state file).
#
# Para que corra necesita el secret GCP_INDEXING_CREDS (JSON del Service Account
# con rol "Owner" en GSC). Si el secret no está, el job falla rápido con mensaje
# claro — no rompe nada.

on:
  schedule:
    # Todos los días a las 09:00 UTC (06:00 AR) — horario bajo de deploys
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: false
        default: 'all'
        type: choice
        options:
          - all       # todas las URLs del sitemap (default, respeta dedupe + quota)
          - priority  # solo URLs del sitemap-priority (top 60-80)

jobs:
  google-indexing:
    runs-on: ubuntu-latest
    # Opt-in a Node 24 para actions JS (silencia el warning de deprecación
    # de Node 20 que GitHub va a forzar en junio 2026).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Restore state file
        uses: actions/cache@v4
        with:
          path: scripts/.indexing-api-state.json
          key: google-indexing-state-${{ github.run_id }}
          restore-keys: |
            google-indexing-state-

      - name: Write GCP credentials
        env:
          GCP_CREDS: ${{ secrets.GCP_INDEXING_CREDS }}
        run: |
          if [ -z "$GCP_CREDS" ]; then
            echo "::error::Falta el secret GCP_INDEXING_CREDS. Agregalo en Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p /tmp/gcp
          echo "$GCP_CREDS" > /tmp/gcp/creds.json
          chmod 600 /tmp/gcp/creds.json

      - name: Push URLs to Google Indexing API
        env:
          GOOGLE_INDEXING_CREDS: /tmp/gcp/creds.json
          GOOGLE_INDEXING_HOST: https://hacecuentas.com
          GOOGLE_INDEXING_LIMIT: '200'
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          # Priority queue: si hay scripts/indexing-priority-queue.txt con URLs,
          # lo procesamos primero (respeta dedupe de 7 días + quota). Sirve para
          # forzar submission inmediato de calcs recién deployadas antes que el
          # sitemap las mezcle con el lote general.
          if [ -f scripts/indexing-priority-queue.txt ] && [ -s scripts/indexing-priority-queue.txt ]; then
            echo "::notice::Priority queue detected, processing first."
            python3 scripts/google-indexing-api.py --from-file scripts/indexing-priority-queue.txt
          fi
          if [ "$MODE" = "priority" ]; then
            python3 scripts/google-indexing-api.py
          else
            python3 scripts/google-indexing-api.py --all
          fi

      - name: Save state file
        uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/.indexing-api-state.json
          key: google-indexing-state-${{ github.run_id }}

      # El state file está en .gitignore — persistencia entre runs vía
      # actions/cache arriba, no vía commit al repo.

      # Alerta proactiva: si el run de hoy consumió >= 90% del budget diario
      # (200 URLs), avisa para que (a) sepamos si hay backlog de URLs nuevas
      # o (b) el dedupe de 7d no está funcionando. Detecta también el caso
      # 100% (quota exceeded en mid-run).
      - name: Alert if quota near limit
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f scripts/.indexing-api-state.json ]; then exit 0; fi
          TODAY_COUNT=$(node -e "
            const s = JSON.parse(require('fs').readFileSync('scripts/.indexing-api-state.json', 'utf8'));
            const sent = s.sent || {};
            const cutoff = (Date.now() / 1000) - (24 * 3600);
            const today = Object.entries(sent).filter(([_, t]) => t >= cutoff).length;
            console.log(today);
          ")
          echo "URLs pusheadas en últimas 24h: $TODAY_COUNT / 200"
          if [ "$TODAY_COUNT" -ge 180 ]; then
            TITLE="⚠️ Google Indexing quota near limit ($TODAY_COUNT/200) — $(date -u +'%Y-%m-%d')"
            BODY="El cron de Google Indexing API consumió **$TODAY_COUNT URLs en las últimas 24h** (≥90% del budget de 200/día).

            **Posibles causas:**
            - Backlog grande de URLs nuevas a indexar (deploy masivo reciente).
            - Dedupe de 7 días no aplicando (revisar que el state file persiste).
            - Quota límite alcanzada → URLs nuevas hoy no se pushearon.

            **Próximos pasos:**
            - Revisar \`scripts/.indexing-api-state.json\` (artifact del run).
            - Considerar pedir aumento de quota a Google si el backlog es legítimo.
            - Si las URLs son del cron sweep, está OK — el dedupe rotará en 7 días.

            🤖 Auto-generado por google-indexing-daily"
            gh issue create --title "$TITLE" --body "$BODY" --label google-indexing-quota || true
          fi

      - name: Open GitHub issue if push failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🚨 Google Indexing API daily push falló ($(date -u +'%Y-%m-%d'))"
          BODY=$(cat <<EOF
          El cron diario de Google Indexing API falló.

          **Workflow:** [\`${{ github.workflow }}\` run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Trigger:** ${{ github.event_name }}
          **Fecha:** $(date -u +'%Y-%m-%d %H:%M UTC')

          ## Causas típicas
          1. **Quota excedida**: Google Indexing API permite 200 URLs/día por proyecto. Si subiste el límite, ajustar \`GOOGLE_INDEXING_LIMIT\`.
          2. **Credenciales inválidas**: el secret \`GCP_INDEXING_CREDS\` puede haber expirado o el Service Account perdió rol "Owner" en GSC.
          3. **403 Forbidden**: la verificación del sitio en GSC pudo haber caído (verificar \`hacecuentas.com\` en Search Console).
          4. **5xx transitorio**: re-correr manualmente con \`workflow_dispatch\`.

          ## Próximos pasos
          - Revisar el log completo en el run linkeado arriba
          - Verificar quota en [GCP Console](https://console.cloud.google.com/apis/dashboard) → "Web Search Indexing API"
          EOF
          )
          EXISTING=$(gh issue list --label google-indexing-failure --state open --json number --jq '.[0].number' || echo '')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label google-indexing-failure 2>/dev/null || \
              gh issue create --title "$TITLE" --body "$BODY"
          fi
