name: Lighthouse CI (weekly)

# Corre Lighthouse sobre las ~10 páginas principales una vez por semana.
# Reporta scores de Performance, Accessibility, Best Practices, SEO en GitHub.
# No bloquea PRs — es observabilidad, no gate. Los scores se comparan
# semana a semana para detectar regresiones de Core Web Vitals.

on:
  schedule:
    # Lunes 11:00 UTC (8am ART)
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://hacecuentas.com/
            https://hacecuentas.com/guias
            https://hacecuentas.com/categoria/finanzas
            https://hacecuentas.com/calculadora-interes-compuesto
            https://hacecuentas.com/calculadora-imc
            https://hacecuentas.com/sueldo-en-mano-argentina
            https://hacecuentas.com/presupuesto-familiar
            https://hacecuentas.com/simulador-jubilacion-anses
            https://hacecuentas.com/guia/finanzas-personales
            https://hacecuentas.com/cambio-de-monedas
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 2
          configPath: ./.github/lighthouserc.json
